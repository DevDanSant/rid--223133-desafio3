<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header >
        <h1 class="board-tarefas">Board de tarefas</h1>
    </header>

    <main>
        <div class="input-task">
            <input type="text" id="name-task" placeholder="nome da tarefa">

            <input type="text" id="inp-tag" placeholder="etiqueta">

            <button id="btn-add" title="adiconar tarefa">+</button>

        </div>

         <div class="task-list" id="task-list"></div>
    </main>

    
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de tarefas</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header >
        <h1 class="board-tarefas">Board de tarefas</h1>
    </header>

    <main>
        <div class="input-task">
            <form action="" id="form-task">
                <input type="text" id="nametask" name="description" placeholder="nome da tarefa">
                
                <input type="text" id="inp-tag" name="tag" placeholder="etiqueta">
                
                <input type="submit"  id="btn-add" title="adiconar tarefa" value="+">
                
            </form>

        </div>

         <div class="task-list" id="task-list"></div>

         
    </main>

    
</body>
</html>
